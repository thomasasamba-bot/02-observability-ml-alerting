# =============================================================================
# .github/workflows/deploy.yml
#
# Deployment pipeline — runs on merge to main.
#
# Jobs:
#   build-image  → build + push Docker image to GitHub Container Registry
#   deploy-k8s   → apply K8s manifests (skipped if KUBECONFIG secret absent)
#
# Fixes applied:
#   - BUILD_DATE now uses a run step (safe for both push and workflow_dispatch)
#   - image-tag output uses a deterministic single-tag (sha-) for kubectl
#   - deploy-k8s is skipped gracefully when KUBECONFIG secret is not set
#   - docker-container buildx driver added (required for GHA cache support)
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/observability-ml

jobs:
  # ── Build & push image ──────────────────────────────────────────────────────
  build-image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      # Single deterministic tag used by deploy-k8s kubectl set image
      image-sha-tag: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set build date
        id: date
        run: echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker-container driver is required for type=gha cache support.
      # The default docker driver does not support cache export.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # infra/kubernetes/deployments/*.yaml and jobs/training-job.yaml all
          # reference `observability-ml:latest`, which is this Dockerfile —
          # NOT app/serving/Dockerfile (a separate, narrower image used only
          # by local `docker compose build`). Building the wrong one here
          # would push an image none of the K8s manifests actually ask for.
          file: infra/docker/base-images/python-ml-base.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ steps.date.outputs.BUILD_DATE }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Kubernetes ────────────────────────────────────────────────────
  deploy-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-image
    environment: ${{ github.event.inputs.environment || 'staging' }}
    # Skip gracefully if KUBECONFIG secret is not configured.
    # This is expected for portfolio repos without a live cluster.
    # To enable: add KUBECONFIG (base64-encoded kubeconfig) as a repo secret.
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        id: kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "KUBECONFIG secret not set — skipping deploy steps."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            mkdir -p $HOME/.kube
            echo "$KUBECONFIG_B64" | base64 -d > $HOME/.kube/config
            chmod 600 $HOME/.kube/config
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply manifests
        if: steps.kubeconfig.outputs.configured == 'true'
        run: |
          kubectl apply -f infra/kubernetes/namespace.yaml
          kubectl apply -f infra/kubernetes/monitoring/
          kubectl apply -f infra/kubernetes/deployments/
          kubectl apply -f infra/kubernetes/ingress/

      - name: Update image to new SHA tag
        if: steps.kubeconfig.outputs.configured == 'true'
        run: |
          kubectl set image deployment/inference-server \
            inference-server=${{ needs.build-image.outputs.image-sha-tag }} \
            -n mlops
          kubectl set image deployment/metrics-exporter \
            metrics-exporter=${{ needs.build-image.outputs.image-sha-tag }} \
            -n mlops
          # NOTE: infra/kubernetes/jobs/training-job.yaml is intentionally not
          # updated here — retraining is a deliberate, separate action, not
          # something every deploy should trigger. To retrain against this
          # build, re-apply training-job.yaml with its `image:` field pointed
          # at ${{ needs.build-image.outputs.image-sha-tag }} (or re-run
          # `bash scripts/deployment/deploy-k8s.sh --train` against the cluster).

      - name: Wait for rollout
        if: steps.kubeconfig.outputs.configured == 'true'
        run: |
          kubectl rollout status deployment/inference-server -n mlops --timeout=120s
          kubectl rollout status deployment/metrics-exporter -n mlops --timeout=120s