apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-pvc
  namespace: mlops
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlops
  labels:
    app: mlflow
    component: model-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
        component: model-registry
      annotations:
        prometheus.io/scrape: "false"
    spec:
      containers:
        - name: mlflow
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - |
              pip install mlflow==3.13.0 --quiet && \
              mlflow server \
                --host 0.0.0.0 \
                --port 5000 \
                --backend-store-uri sqlite:///mlflow/mlflow.db \
                --default-artifact-root /mlflow/artifacts
          ports:
            - containerPort: 5000
              name: http
          volumeMounts:
            - name: mlflow-storage
              mountPath: /mlflow
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: mlflow-storage
          persistentVolumeClaim:
            claimName: mlflow-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlops
  labels:
    app: mlflow
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
      name: http
  type: ClusterIP

---
