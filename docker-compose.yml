# =============================================================================
# Enterprise MLOps Observability Platform
# =============================================================================
#
# Purpose
# -----------------------------------------------------------------------------
# Local development and observability orchestration stack for:
#
# - MLflow experiment tracking & model registry
# - ML inference server (credit scoring) + drift detection
# - Prometheus metrics exporter (bridges MLflow -> Prometheus)
# - AIOps infrastructure anomaly detection
# - Prometheus monitoring
# - Grafana visualization
# - Alertmanager alert routing
# - Elasticsearch event indexing
# - Logstash log processing
# - Kibana analytics
#
# NOTE:
# -----------------------------------------------------------------------------
# Markdown image rendering does NOT work inside docker-compose.yml comments.
# These architecture images are intended for README.md documentation.
#
# Recommended documentation references:
#
# docs/architecture/METRICS_PIPELINE-Time_Series_Observability.png
# docs/architecture/LOGS_PIPELINE-Event_Driven_Observability.png
#
# =============================================================================

version: "3.9"

services:

  # ===========================================================================
  # MLflow Tracking Server & Model Registry
  # ===========================================================================
  mlflow:

    build:
      context: .
      dockerfile: infra/docker/mlflow/Dockerfile

    container_name: mlflow

    ports:
      - "5000:5000"

    volumes:
      - mlflow-data:/mlflow-data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 300s

  # ===========================================================================
  # ML Inference Server (credit scoring + drift detection) — port 8006
  # ===========================================================================
  inference-server:

    build:
      context: .
      dockerfile: app/serving/Dockerfile

    container_name: inference-server

    ports:
      - "8006:8006"

    environment:
      MLFLOW_TRACKING_URI:  http://mlflow:5000
      MLFLOW_EXPERIMENT:    credit-scoring
      MODEL_STAGE:          Staging
      SERVICE_NAME:         ml-inference-server
      MAX_BATCH_SIZE:       "500"
      LOG_LEVEL:            INFO
      DECISION_THRESHOLD:   "0.40"
      LOW_CONF_LOW:         "0.35"
      LOW_CONF_HIGH:        "0.55"
      PREDICTION_BUFFER_SIZE: "2000"
      MODEL_RELOAD_INTERVAL:  "300"
      DRIFT_WINDOW:         "300"
      DRIFT_INTERVAL:       "120"
      PSI_WARN_THRESHOLD:   "0.10"
      PSI_ALERT_THRESHOLD:  "0.25"
      KS_ALPHA:             "0.05"
      MIN_WINDOW_SIZE:      "50"
      SCHEMA_PATH:          data/processed/feature_schema.json

    volumes:
      # Bind-mounted (not a named volume) so the schema/model artifacts
      # written by `docker compose exec inference-server python -m
      # app.pipeline.train` are immediately visible to metrics-exporter too.
      - ./data:/app/data

    depends_on:
      mlflow:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ===========================================================================
  # Prometheus Metrics Exporter (bridges MLflow + dataset stats) — port 8007
  # ===========================================================================
  metrics-exporter:

    build:
      context: .
      dockerfile: app/serving/Dockerfile

    container_name: metrics-exporter

    command: ["uvicorn", "app.exporter.metrics_exporter:app", "--host", "0.0.0.0", "--port", "8007"]

    ports:
      - "8007:8007"

    environment:
      MLFLOW_TRACKING_URI:     http://mlflow:5000
      MLFLOW_EXPERIMENT:       credit-scoring
      MODEL_NAME:              credit-scoring-model
      INFERENCE_BASE_URL:      http://inference-server:8006
      EXPORTER_POLL_INTERVAL:  "60"
      SCHEMA_PATH:             data/processed/feature_schema.json
      BASELINE_CSV:            data/raw/credit_baseline.csv
      DRIFTED_CSV:             data/raw/credit_drifted.csv
      LOG_LEVEL:               INFO

    volumes:
      - ./data:/app/data

    depends_on:
      mlflow:
        condition: service_healthy
      inference-server:
        condition: service_started

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ===========================================================================
  # AIOps Infrastructure Anomaly Detection Service — port 8000
  # ===========================================================================
  #
  # Runs app.anomaly_detection.detector:app (Z-Score / EWMA / Isolation
  # Forest on CPU/memory/disk/network). Previously this service built from
  # app/serving/Dockerfile (the ML inference image) by mistake, which meant
  # it never ran this app at all and the health check / port mapping never
  # matched what was actually built.
  #
  anomaly-detector:

    build:
      context: .
      dockerfile: app/anomaly_detection/Dockerfile

    container_name: anomaly-detector

    ports:
      - "8005:8000"

    environment:
      PROMETHEUS_URL: http://prometheus:9090
      ALERTMANAGER_URL: http://alertmanager:9093
      ELASTICSEARCH_URL: http://elasticsearch:9200

    depends_on:
      - prometheus
      - alertmanager
      - elasticsearch

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # Prometheus Monitoring Service
  # ===========================================================================
  prometheus:

    image: prom/prometheus:latest

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus-data:/prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

    depends_on:
      - node-exporter
      - cadvisor

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # Grafana Visualization Platform
  # ===========================================================================
  grafana:

    image: grafana/grafana:latest

    container_name: grafana

    ports:
      - "3000:3000"

    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"

    depends_on:
      - prometheus

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # Alertmanager
  # ===========================================================================
  alertmanager:

    image: prom/alertmanager:latest

    container_name: alertmanager

    ports:
      - "9093:9093"

    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml

    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # Elasticsearch
  # ===========================================================================
  elasticsearch:

    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0

    container_name: elasticsearch

    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"

    ports:
      - "9200:9200"

    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://localhost:9200/_cluster/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ===========================================================================
  # Logstash
  # ===========================================================================

  logstash:

    image: docker.elastic.co/logstash/logstash:8.12.0

    container_name: logstash

    ports:
      - "5044:5044"
      - "9600:9600"

    volumes:
      - ./infra/docker/logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf

    depends_on:
      - elasticsearch

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9600"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===========================================================================
  # Kibana
  # ===========================================================================

  kibana:

    image: docker.elastic.co/kibana/kibana:8.12.0

    container_name: kibana

    ports:
      - "5601:5601"

    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

    depends_on:
      - elasticsearch

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===========================================================================
  # Node Exporter
  # ===========================================================================

  node-exporter:

    image: prom/node-exporter:latest

    container_name: node-exporter

    ports:
      - "9100:9100"

    pid: host

    volumes:
      - /:/host:ro

    command:
      - "--path.rootfs=/host"

    restart: unless-stopped

  # ===========================================================================
  # Filebeat
  # ===========================================================================
  filebeat:

    image: docker.elastic.co/beats/filebeat:8.12.0

    container_name: filebeat

    user: root

    volumes:
      - ./infra/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

    command: >
      filebeat -e -strict.perms=false

    depends_on:
      - logstash

    restart: unless-stopped

  # ===========================================================================
  # cAdvisor
  # ===========================================================================
  cadvisor:

    image: gcr.io/cadvisor/cadvisor:latest

    container_name: cadvisor

    ports:
      - "8080:8080"

    privileged: true

    devices:
      - /dev/kmsg

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

# =============================================================================
# Persistent Volumes
# =============================================================================
volumes:

  prometheus-data:
  grafana-data:
  elasticsearch-data:
  mlflow-data:
